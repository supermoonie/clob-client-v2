name: Build, Lint, and Test

on:
    push:
        branches: [main]
    pull_request:

jobs:
    build-lint-test:
        name: Build, Lint, and Test
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4.1.4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm build
            - run: pnpm test

    all-jobs-pass:
        name: All jobs pass
        runs-on: ubuntu-22.04
        needs:
            - build-lint-test
        steps:
            - run: echo "success"
